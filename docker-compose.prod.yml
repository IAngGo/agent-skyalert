services:

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: skyalert
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: skyalert
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skyalert"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql://skyalert:${DB_PASSWORD}@db:5432/skyalert
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    command: uvicorn backend.infrastructure.api.main:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://skyalert:${DB_PASSWORD}@db:5432/skyalert
      REDIS_URL: redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: always

  worker:
    build: .
    command: celery -A backend.infrastructure.tasks.celery_app.celery_app worker --loglevel=warning --concurrency=4
    env_file: .env
    environment:
      DATABASE_URL: postgresql://skyalert:${DB_PASSWORD}@db:5432/skyalert
      REDIS_URL: redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: always

  beat:
    build: .
    command: celery -A backend.infrastructure.tasks.celery_app.celery_app beat --loglevel=warning
    env_file: .env
    environment:
      DATABASE_URL: postgresql://skyalert:${DB_PASSWORD}@db:5432/skyalert
      REDIS_URL: redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: always

volumes:
  postgres_data:
